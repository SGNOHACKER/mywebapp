<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is It Good? | Game Reviews</title>
    <meta name="description" content="A premium tier-list style game review website for gamers by gamers.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="logo glow">Is It Good?</h1>
            <p class="tagline cursive">The Ultimate Gamer's Tier List</p>
        </div>
    </header>

    <main class="container">
        <!-- Main Games Section -->
        <section id="main-games-section" class="game-section">
            <h2 class="section-title glow">Mainstreem Legends</h2>
            <div class="grid" id="main-games-grid">
                <!-- Main games will be injected here via JS -->
            </div>
        </section>

        <!-- Roblox Experiences Section -->
        <section id="roblox-games-section" class="game-section">
            <h2 class="section-title glow">Roblox Experiences</h2>
            <div class="grid" id="roblox-games-grid">
                <!-- Roblox games will be injected here via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p class="cursive">Made with ❤️ for Gamers</p>
    </footer>

    <!-- Review Modal Template (Hidden by default) -->
    <div id="review-modal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h2 class="cursive glow" id="modal-game-title">Add Review</h2>
            <form id="review-form">
                <input type="hidden" id="modal-game-id">
                <div class="form-group">
                    <label for="reviewer-name" class="cursive">Your Name:</label>
                    <input type="text" id="reviewer-name" class="cursive-input" placeholder="Gamer123" required>
                </div>
                <div class="form-group">
                    <label for="reviewer-text" class="cursive">Your Review:</label>
                    <textarea id="reviewer-text" rows="4" class="cursive-input" placeholder="What do you think about this game...?" required></textarea>
                </div>
                <button type="submit" class="btn glow-btn cursive">Submit Review</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
